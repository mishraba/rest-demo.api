trigger:
- main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =====================================
# CI - BUILD
# =====================================
- stage: Build
  displayName: 'Build Application'

  jobs:
  - job: Build
    displayName: 'Build ASP.NET Core App'

    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '10.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore Packages'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration)'

    # - task: DotNetCoreCLI@2
    #   displayName: 'Run Unit Tests'
    #   inputs:
    #     command: 'test'
    #     projects: '**/*Tests/*.csproj'
    #     arguments: '--configuration $(buildConfiguration)'
    #   continueOnError: true

    - task: DotNetCoreCLI@2
      displayName: 'Publish Application'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'drop'

# =====================================
# CD - DEV DEPLOYMENT
# =====================================
- stage: Deploy_Dev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployDev
    displayName: 'Deploy to DEV Web App'
    environment: 'DEV'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy to DEV Web App'
            inputs:
              azureSubscription: 'rg-mishraba-practice-service-connection'
              appType: 'webApp'
              appName: 'web-dev-dotnet-mishraba'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

# =====================================
# CD - QA DEPLOYMENT
# =====================================
- stage: Deploy_QA
  displayName: 'Deploy to QA'
  dependsOn: Deploy_Dev
  condition: succeeded()

  jobs:
  - deployment: DeployQA
    displayName: 'Deploy to QA Web App'
    environment: 'QA'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy to QA Web App'
            inputs:
              azureSubscription: 'rg-mishraba-practice-service-connection'
              appType: 'webApp'
              appName: 'web-qa-dotnet-mishraba'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'